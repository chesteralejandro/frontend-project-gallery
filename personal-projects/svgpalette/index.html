<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SVGPalette</title>
		<link rel="stylesheet" href="./css/main.css" />
	</head>
	<body>
		<header class="app-header">
			<h1 class="title">SVGPalette</h1>
			<p class="tagline">
				Paste, preview, recolor, and download SVGs instantly.
			</p>
		</header>

		<main class="app-body">
			<div class="editor-panel">
				<section>
					<label for="svg-input">SVG Code</label>
					<textarea
						class="svg-input"
						id="svg-input"
						placeholder="Paste your SVG code here..."
					></textarea>
				</section>
			</div>

			<div class="preview-panel">
				<section>
					<h2>Preview</h2>
					<div id="svg-preview"></div>
				</section>
				<section>
					<h2>Colors</h2>
					<div id="color-pickers"></div>
				</section>

				<button id="btn-download">Download SVG</button>
			</div>
		</main>

		<footer class="app-footer">
			<p>Built for fast SVG editing</p>
		</footer>
	</body>
</html>
