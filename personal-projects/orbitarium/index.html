<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<script src="./js/main.js" defer></script>
		<title>Orbitarium</title>
	</head>
	<body>
		<header id="start-screen" class="start-screen active">
			<article class="glass-card">
				<h1>Orbitarium</h1>
				<p>
					Explore the Solar System through an interactive visual
					experience.
				</p>
				<button id="start-btn">Start Experience</button>
			</article>
		</header>

		<main id="orbitarium-screen" class="space">
			<article class="sun">&nbsp;</article>

			<section class="orbit mercury-orbit">
				<article class="planet mercury texture-shift">&nbsp;</article>
			</section>

			<section class="orbit venus-orbit">
				<article class="planet venus texture-shift">&nbsp;</article>
			</section>

			<section class="orbit earth-orbit">
				<article class="planet earth texture-shift">
					<section class="orbit moon-orbit">
						<article class="planet moon">&nbsp;</article>
					</section>
				</article>
			</section>

			<section class="orbit mars-orbit">
				<article class="planet mars texture-shift">&nbsp;</article>
			</section>

			<section class="orbit jupiter-orbit">
				<article class="planet jupiter texture-shift">&nbsp;</article>
			</section>

			<section class="orbit saturn-orbit">
				<article class="planet saturn">
					<div class="saturn-body texture-shift">&nbsp;</div>
					<div class="saturn-ring">&nbsp;</div>
				</article>
			</section>

			<section class="orbit uranus-orbit">
				<article class="planet uranus texture-shift">&nbsp;</article>
			</section>

			<section class="orbit neptune-orbit">
				<article class="planet neptune texture-shift">&nbsp;</article>
			</section>
		</main>

		<audio id="bg-music" src="./assets/audio/music/cosmos.mp3" loop></audio>
	</body>
</html>
