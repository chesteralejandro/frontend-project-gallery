<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<link rel="icon" href="./assets/images/favicon.png" type="image/png" />
		<script defer type="module" src="./js/main.js"></script>
		<title>Cell Defender</title>
	</head>
	<body>
		<main class="container">
			<section id="start-screen" class="start-screen">
				<header>
					<h1 class="title">CELL DEFENDER</h1>
					<p class="subtitle">Eliminate germs. Restore balance.</p>
				</header>

				<section class="menu-box">
					<p>🧬 You are a White Blood Cell</p>
					<p>🦠 Avoid and defeat germs</p>
					<p>💊 Collect all medicine pills</p>
				</section>

				<section class="menu-buttons">
					<button id="start-btn" class="menu-btn">
						Start Defense
					</button>
					<button id="how-btn" class="menu-btn">How to Play</button>
					<button id="exit-btn" class="menu-btn">Exit</button>
				</section>
			</section>

			<section id="game-screen" class="game-screen hidden">
				<div id="tiles-container" class="tiles-container">&nbsp;</div>

				<article id="white-cell" class="white-cell">&nbsp;</article>
				<article id="biru" class="enemy biru">&nbsp;</article>
				<article id="bacu" class="enemy bacu">&nbsp;</article>
				<article id="gemru" class="enemy gemru">&nbsp;</article>
			</section>

			<section id="game-over-screen" class="game-over-screen hidden">
				<h2>GAME OVER</h2>
				<p>You were infected 💀</p>
				<button id="restart-btn" class="menu-btn">Restart</button>
			</section>
		</main>
	</body>
</html>
