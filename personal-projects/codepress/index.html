<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="./js/main.js" defer></script>
		<link rel="stylesheet" href="./css/main.css" />
		<title>CodePress</title>
	</head>
	<body>
		<main class="app">
			<section class="card">
				<header>
					<h1 class="title">CodePress</h1>
					<p class="subtitle">Minify your HTML code instantly</p>
				</header>

				<section class="file-upload">
					<label for="fileInput" class="dropzone">
						Drag & Drop HTML file here, or click to upload
					</label>
					<input
						type="file"
						id="fileInput"
						accept=".html,.css,.js,.md"
						hidden
					/>
				</section>

				<section class="editor">
					<textarea
						id="output-textarea"
						placeholder="Minified output..."
						readonly
					></textarea>
				</section>

				<footer class="actions">
					<button id="btn-copy" disabled>Copy</button>
					<button id="btn-clear">Clear</button>
				</footer>
			</section>
		</main>
	</body>
</html>
