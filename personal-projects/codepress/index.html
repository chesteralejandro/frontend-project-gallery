<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/main.css" />
		<title>CodePress</title>
	</head>
	<body>
		<main class="app">
			<header>
				<h1 class="title">CodePress</h1>
				<p class="subtitle">Minify your HTML code instantly</p>
			</header>

			<section class="editor">
				<textarea
					id="input"
					placeholder="Paste your HTML here..."
				></textarea>
				<textarea
					id="output"
					placeholder="Minified output..."
					readonly
				></textarea>
			</section>

			<button id="btn-minify">Minify HTML</button>
		</main>
	</body>
</html>
