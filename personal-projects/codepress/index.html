<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="./js/main.js" defer></script>
		<link rel="stylesheet" href="./css/main.css" />
		<title>CodePress</title>
	</head>
	<body>
		<main class="app">
			<article class="card">
				<header>
					<h1 class="title">CodePress</h1>
					<p class="subtitle">
						Prepare clean, AI-ready code in seconds
					</p>
				</header>

				<section class="input-zone">
					<span class="filetype-badge">&nbsp;</span>

					<div class="input-overlay">
						<p class="input-title">
							Paste code or drop a file here
						</p>
						<span class="input-subtitle"
							>Supports HTML, CSS, JS, and Markdown</span
						>
					</div>

					<textarea id="input-textarea" spellcheck="false"></textarea>

					<input
						type="file"
						id="fileInput"
						accept=".html,.css,.js,.md"
						hidden
					/>
				</section>

				<section class="output-zone">
					<textarea
						readonly
						id="output-textarea"
						placeholder="Minified code will appear here..."
					></textarea>
				</section>

				<footer class="actions">
					<button id="btn-copy" disabled>Copy</button>
					<button id="btn-clear">Clear</button>
				</footer>
			</article>
		</main>
	</body>
</html>
